name: STM32 Makefile Build CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  TOOLCHAIN_VERSION: "13.3.rel1"
  TOOLCHAIN_DIR: "${{ github.workspace }}/.toolchain"
  FIRMWARE_DIR: "03_Firmware/01_APP"

jobs:
  build:
    name: Build STM32F411 Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache ARM GCC toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: arm-none-eabi-${{ env.TOOLCHAIN_VERSION }}-linux-x86_64

      - name: Download ARM GCC toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ env.TOOLCHAIN_DIR }}
          TARBALL="arm-gnu-toolchain-${{ env.TOOLCHAIN_VERSION }}-x86_64-arm-none-eabi.tar.xz"
          URL="https://developer.arm.com/-/media/Files/downloads/gnu/${{ env.TOOLCHAIN_VERSION }}/binrel/${TARBALL}"
          echo "Downloading: $URL"
          curl -L --retry 3 -o /tmp/toolchain.tar.xz "$URL"
          tar -xf /tmp/toolchain.tar.xz --strip-components=1 -C ${{ env.TOOLCHAIN_DIR }}
          rm /tmp/toolchain.tar.xz

      - name: Add toolchain to PATH
        run: |
          echo "${{ env.TOOLCHAIN_DIR }}/bin" >> $GITHUB_PATH

      - name: Verify toolchain
        run: arm-none-eabi-gcc --version

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Build firmware
        run: make -C ${{ env.FIRMWARE_DIR }} -j$(nproc)

      - name: Memory usage report
        run: make -C ${{ env.FIRMWARE_DIR }} mem-report

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            ${{ env.FIRMWARE_DIR }}/build/helloworld.elf
            ${{ env.FIRMWARE_DIR }}/build/helloworld.hex
            ${{ env.FIRMWARE_DIR }}/build/helloworld.bin
            ${{ env.FIRMWARE_DIR }}/build/helloworld.map
          retention-days: 30
